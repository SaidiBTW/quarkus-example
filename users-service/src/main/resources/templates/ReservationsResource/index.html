<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reservations</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css" />
    <script src="https://unpkg.com/htmx.org@1.7.0"></script>
  </head>
  <body>
    <header>
      <h1>Reservations</h1>
      <p>For logged-in user: {name}</p>
      <a href="/logout">Log out</a>

      <h2>List of reservations</h2>
      <div id="reservations" hx-get="/get" hx-trigger="load"></div>
    </header>
  </body>
  <h2>Available cars to rent</h2>
  <form hx-get="/available" hx-target="#availability">
    <p>
      Start date:
      <input
        type="date"
        name="startDate"
        id="startDateInput"
        value="{startDate}"
      />
    </p>
    <p>
      End date:
      <input type="date" name="endDate" id="endDateInput" value="{endDate}" />
    </p>
    <input type="submit" value="Update list" />
  </form>
  <div
    id="availability"
    hx-get="/available"
    hx-trigger="load, update-available-cars-list from:body"
    hx-include="[id='startDateInput'],[id='endDateInput']"
  ></div>
</html>
